<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mochi Walker</title>
<link rel="stylesheet" href="mascot.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #stage { position: absolute; inset: 0; }
  #mochi-host {
    position: absolute; bottom: 2px; left: 0;
    will-change: transform, left, bottom; cursor: grab;
  }
  #mochi-host.dragging { cursor: grabbing; }
  #hint {
    position: absolute; bottom: 3px; padding: 5px 10px; font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px; color: #fff; background: rgba(60, 55, 75, 0.85); border-radius: 8px;
    white-space: nowrap; pointer-events: none; transition: opacity 1s;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="mochi-host"></div>
  <div id="hint">drag me · click = new trick · scroll = size · right-click = bye bye</div>
</div>

<script src="mascot.js"></script>
<script>
(() => {
  const host = document.getElementById('mochi-host');
  const hint = document.getElementById('hint');
  const mochi = new MochiSprite(host, { size: 96 });

  const GROUND = ['idle', 'sit', 'walk', 'run', 'eat', 'dance', 'play', 'tired'];
  const FLY_ONLY = ['fly'];
  const pick = a => a[(Math.random() * a.length) | 0];
  const W = () => window.innerWidth, H = () => window.innerHeight;

  let x = 60, y = 0, dir = 1, targetY = 0, dragging = false;
  let beh = 'walk', stateTimer = null, lastTs = null, size = 96;

  function spriteW() { return size * (320 / 280); }

  function walkNext(state, dur, vx) {
    clearTimeout(stateTimer);
    mochi.setState(state);
    mochi._vx = vx || 0;
    targetY = 0;
    stateTimer = setTimeout(chooseGround, dur);
  }
  function chooseGround() {
    if (dragging) return;
    const r = Math.random();
    if (mochi.state === 'tired') { walkNext('sleep', 14000 + Math.random() * 16000, 0); return; }
    if (Math.random() < 0.3) { dir *= -1; mochi.setDirection(dir); }
    if      (r < 0.34) walkNext('walk', 6500 + Math.random() * 8000, 58);
    if      (r < 0.42) walkNext('run', 2200 + Math.random() * 2200, 165);
    else if (r < 0.72) { let s; do { s = pick(GROUND.filter(g => g !== 'walk' && g !== 'run')); } while (s === mochi.state); walkNext(s, 4200 + Math.random() * 4200, 0); }
    else if (r < 0.9)  flyNext();
    else               walkNext('tired', 2600 + Math.random() * 1800, 0);
  }
  function flyNext() {
    if (dragging) return;
    clearTimeout(stateTimer);
    mochi.setState('fly');
    mochi._vx = 60;
    const maxAlt = Math.max(160, H() * 0.55 - size);
    targetY = 120 + Math.random() * (maxAlt - 120);
    stateTimer = setTimeout(() => { targetY = 0; stateTimer = setTimeout(chooseGround, 900); }, 6000 + Math.random() * 6000);
  }

  function step(ts) {
    if (lastTs !== null && !dragging) {
      const dt = Math.min(ts - lastTs, 100) / 1000;
      if (mochi._vx) {
        x += dir * mochi._vx * dt;
        const maxX = W() - spriteW() - 4;
        if (x <= 4) { x = 4; dir = 1; mochi.setDirection(dir); }
        if (x >= maxX) { x = maxX; dir = -1; mochi.setDirection(dir); }
      }
      const sp = mochi.state === 'fly' ? 90 : 60;
      if (y < targetY) y = Math.min(targetY, y + sp * dt);
      else if (y > targetY) y = Math.max(targetY, y - sp * dt);
      host.style.left = x + 'px';
      host.style.bottom = (2 + y) + 'px';
    }
    lastTs = ts;
    requestAnimationFrame(step);
  }

  // ---- click-through: only the sprite itself is interactive ----
  let interactive = false;
  document.addEventListener('mousemove', e => {
    const w = spriteW();
    const bottomPx = window.innerHeight - 2 - y;
    const over = e.clientX >= x - 10 && e.clientX <= x + w + 10 &&
                 e.clientY >= bottomPx - size - 14 && e.clientY <= bottomPx + 10;
    if (over !== interactive) { interactive = over; if (window.pet) window.pet.setInteractive(over); }
  });

  // ---- click = new trick, drag = reposition ----
  let dx0, dy0, moved = false, down = false;
  host.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    down = true; moved = false; dx0 = e.clientX; dy0 = e.clientY;
    host.setPointerCapture(e.pointerId);
  });
  host.addEventListener('pointermove', e => {
    if (!down) return;
    if (!moved && Math.hypot(e.clientX - dx0, e.clientY - dy0) > 6) {
      moved = true; dragging = true; clearTimeout(stateTimer);
      host.classList.add('dragging');
    }
    if (dragging) {
      x = Math.max(0, Math.min(W() - spriteW(), e.clientX - spriteW() / 2));
      let b = H() - e.clientY - size * 0.45;
      b = Math.max(2, Math.min(H() - size - 6, b));
      host.style.left = x + 'px'; host.style.bottom = b + 'px';
    }
  });
  function up() {
    if (!down) return;
    down = false;
    if (!moved) { newTrick(); return; }
    dragging = false; host.classList.remove('dragging');
    y = Math.max(0, (parseFloat(host.style.bottom) || 2) - 2);
    targetY = y;
    stateTimer = setTimeout(y > 30 ? flyNext : chooseGround, 800 + Math.random() * 1200);
  }
  host.addEventListener('pointerup', up);
  host.addEventListener('pointercancel', up);

  function newTrick() {
    if (Math.random() < 0.22) flyNext();
    else { let s; do { s = pick(GROUND); } while (s === mochi.state); walkNext(s, s==='walk'?6500:s==='run'?2200:4200, s==='walk'?58:s==='run'?165:0); }
  }

  host.addEventListener('contextmenu', e => { e.preventDefault(); if (window.pet) window.pet.close(); });

  // ---- scroll to resize ----
  document.addEventListener('wheel', e => {
    if (!interactive) return;
    size = Math.max(48, Math.min(200, size - Math.sign(e.deltaY) * 8));
    mochi.setSize(size);
    if (window.pet) window.pet.saveSettings({ walkerSize: size });
  }, { passive: true });

  // ---- init ----
  if (window.pet) window.pet.getSettings().then(s => { if (s && s.walkerSize) { size = s.walkerSize; mochi.setSize(size); } });
  host.style.left = x + 'px'; host.style.bottom = '2px';
  requestAnimationFrame(step);
  walkNext('walk', 6000 + Math.random() * 4000, 58);
  setTimeout(() => { hint.style.opacity = '0'; setTimeout(() => hint.remove(), 1100); }, 6000);
})();
</script>
</body>
</html>
